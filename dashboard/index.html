<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Electoral - Boyacá 2026</title>
    <style>
        /* CSS Custom Properties para el Bonus de Dark Mode */
        :root {
            --bg-color: #f4f6f9;
            --card-bg: #ffffff;
            --text-color: #333333;
            --primary-color: #2c3e50;
            --border-color: #e0e0e0;
        }

        [data-theme="dark"] {
            --bg-color: #1e1e2f;
            --card-bg: #27293d;
            --text-color: #ffffff;
            --primary-color: #00d6b4;
            --border-color: #3d3f5d;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            transition: all 0.3s ease;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 15px;
            margin-bottom: 20px;
        }

        .btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 10px 15px;
            cursor: pointer;
            border-radius: 5px;
            font-weight: bold;
            margin-left: 10px;
            transition: opacity 0.2s;
        }

        .btn:hover {
            opacity: 0.9;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 3fr;
            gap: 20px;
        }

        .panel-control {
            background-color: var(--card-bg);
            padding: 20px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            height: fit-content;
        }

        .panel-datos {
            background-color: var(--card-bg);
            padding: 20px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
        }

        select {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            margin-bottom: 20px;
            border-radius: 4px;
            background: var(--bg-color);
            color: var(--text-color);
            border: 1px solid var(--border-color);
            font-size: 14px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        th, td {
            text-align: left;
            padding: 12px;
            border-bottom: 1px solid var(--border-color);
        }

        th {
            background-color: rgba(0, 0, 0, 0.05);
        }

        [data-theme="dark"] th {
            background-color: rgba(255, 255, 255, 0.05);
        }

        .badge-partido {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 6px;
            vertical-align: middle;
        }

        .votos-destacados {
            background-color: rgba(0, 0, 0, 0.04);
            padding: 4px 8px;
            border-radius: 4px;
            font-family: monospace;
            font-weight: bold;
        }

        [data-theme="dark"] .votos-destacados {
            background-color: rgba(255, 255, 255, 0.08);
        }
    </style>
</head>
<body>

    <div class="header">
        <h2>📊 Monitoreo Escrutinios Boyacá 2026 (Cámara vs Senado)</h2>
        <div>
            <button class="btn" id="btnExportar">📥 Exportar CSV</button>
            <button class="btn" id="btnTheme">🌗 Alternar Modo</button>
        </div>
    </div>

    <div class="grid">
        <div class="panel-control">
            <label for="selectorMunicipio"><strong>Seleccione Municipio:</strong></label>
            <select id="selectorMunicipio" onchange="cambiarMunicipio()">
                <option value="TUNJA">TUNJA</option>
                <option value="PAIPA">PAIPA</option>
                <option value="SOGAMOSO">SOGAMOSO</option>
                <option value="DUITAMA">DUITAMA</option>
            </select>
            
            <div id="resumenMetricas">
                <p><strong>Mesas Procesadas:</strong> <span id="lblMesas">10</span></p>
                <p><strong>Total Votos (Top):</strong> <span id="lblVotos">0</span></p>
                <p><strong>Partido Líder SE:</strong> <span id="lblLiderSE" style="font-weight: bold;">--</span></p>
            </div>
        </div>

        <div class="panel-datos">
            <h3>Top Candidatos Detectados en el Pipeline</h3>
            <table id="tablaCandidatos">
                <thead>
                    <tr>
                        <th>Candidato (Normalizado)</th>
                        <th>Partido</th>
                        <th>Corporación</th>
                        <th>Votos Registrados</th>
                    </tr>
                </thead>
                <tbody>
                    </tbody>
            </table>
        </div>
    </div>

    <script>
        // Colores reglamentarios exigidos por el pliego técnico (Reto 4)
        const coloresPartidos = {
            "ALIANZA VERDE": "#007C34",
            "PACTO HISTÓRICO": "#7B2D8B",
            "PACTO HISTORICO": "#7B2D8B",
            "CENTRO DEMOCRÁTICO": "#1E477D",
            "CENTRO DEMOCRATICO": "#1E477D",
            "CONSERVADOR": "#E07B00",
            "PARTIDO CONSERVADOR": "#E07B00"
        };

        let datosElectorales = {};

        // Carga el archivo data.json mediante una petición local
        function inicializarDashboard() {
            fetch('data.json')
                .then(response => response.json())
                .then(data => {
                    // Mapeo adaptativo tolerante a la raíz del JSON
                    datosElectorales = data.municipios ? data.municipios : data;
                    console.log("Datos del pipeline cargados correctamente:", datosElectorales);
                    cambiarMunicipio();
                })
                .catch(error => {
                    console.error("Error al cargar data.json. Asegúrate de usar http.server:", error);
                });
        }

        // Renderiza los datos en la tabla según el municipio elegido
        function cambiarMunicipio() {
            const mun = document.getElementById('selectorMunicipio').value;
            const dataMun = datosElectorales[mun];
            
            if (!dataMun) return;

            // Extraer lista de candidatos de manera tolerante
            const listaCandidatos = dataMun.top_candidatos || dataMun.candidatos || [];

            // Calcular dinámicamente la suma de votos
            const totalVotos = listaCandidatos.reduce((acc, c) => acc + (c.votos || 0), 0);
            document.getElementById('lblVotos').innerText = totalVotos;

            // Renderizar el partido líder del Senado en el panel izquierdo
            const liderSE = dataMun.partido_lider_senado || "No detectado";
            const colorLider = coloresPartidos[liderSE.toUpperCase()] || "inherit";
            const lblLider = document.getElementById('lblLiderSE');
            lblLider.innerText = liderSE;
            lblLider.style.color = colorLider;

            // Limpiar e iterar sobre el cuerpo de la tabla
            const tbody = document.querySelector('#tablaCandidatos tbody');
            tbody.innerHTML = "";
            
            if (listaCandidatos.length === 0) {
                tbody.innerHTML = `<tr><td colspan="4" style="text-align:center; color:red;">No se encontraron candidatos procesados en el JSON para ${mun}</td></tr>`;
                return;
            }

            listaCandidatos.forEach(c => {
                const nombreCand = c.candidato || c.nombre || "DESCONOCIDO";
                const partidoCand = c.partido || "INDEPENDIENTE";
                const votosCand = c.votos !== undefined ? c.votos : 0;
                
                // Deducir corporación analíticamente si no viene definida
                let corporacion = c.corporacion || "";
                if (!corporacion) {
                    corporacion = nombreCand.toUpperCase().includes("_CA_") ? "CÁMARA" : "SENADO";
                }

                // Obtener color reglamentario o usar gris por defecto
                const colorHex = coloresPartidos[partidoCand.toUpperCase()] || "#7f8c8d";
                
                tbody.innerHTML += `
                    <tr>
                        <td><strong>${nombreCand}</strong></td>
                        <td>
                            <span class="badge-partido" style="background-color: ${colorHex};"></span>
                            ${partidoCand}
                        </td>
                        <td>${corporacion}</td>
                        <td><span class="votos-destacados">${votosCand}</span></td>
                    </tr>
                `;
            });
        }

        // Lógica del switch para Alternar el Modo Claro / Oscuro (Bonus 4.1)
        const btnTheme = document.getElementById('btnTheme');
        btnTheme.addEventListener('click', () => {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', newTheme);
        });

        // Lógica para exportar la tabla del municipio activo a un CSV (Bonus 4.2)
        document.getElementById('btnExportar').addEventListener('click', () => {
            const mun = document.getElementById('selectorMunicipio').value;
            const dataMun = datosElectorales[mun];
            const lista = dataMun ? (dataMun.top_candidatos || dataMun.candidatos || []) : [];
            
            if (lista.length === 0) return;
            
            let csvContent = "data:text/csv;charset=utf-8,Candidato,Partido,Corporacion,Votos\n";
            lista.forEach(c => {
                const n = c.candidato || c.nombre || "DESCONOCIDO";
                const p = c.partido || "INDEPENDIENTE";
                const v = c.votos !== undefined ? c.votos : 0;
                const corp = n.toUpperCase().includes("_CA_") ? "CÁMARA" : "SENADO";
                csvContent += `"${n}","${p}","${corp}",${v}\n`;
            });

            const encodedUri = encodeURI(csvContent);
            const link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", `reporte_votos_${mun.toLowerCase()}_2026.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        });

        // Inicializar el flujo al terminar de cargar la ventana
        window.onload = inicializarDashboard;
    </script>
</body>
</html>
